<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diwan-i-Naksh AI Assistant</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family: serif;
}
</style>

</head>

<body class="bg-stone-100 h-screen flex flex-col">


<!-- OVERLAY -->
<div id="overlay"
onclick="toggleSidebar()"
class="fixed inset-0 bg-black bg-opacity-40 hidden z-40 transition-opacity duration-300">
</div>


<!-- RIGHT SIDEBAR -->
<div id="sidebar"
class="fixed top-0 right-0 h-full w-64 bg-stone-900 text-white
transform translate-x-full transition-transform duration-300 ease-in-out z-50 shadow-lg">


<div class="flex justify-between items-center p-4 border-b border-stone-700">

<span class="text-lg font-semibold">
Menu
</span>

<button onclick="toggleSidebar()"
class="text-xl hover:text-stone-300">
✕
</button>

</div>


<nav class="flex flex-col p-4 space-y-3">

<a href="/" class="hover:bg-stone-700 p-2 rounded">Home</a>
<a href="/map" class="hover:bg-stone-700 p-2 rounded">Map</a>
<a href="/monuments" class="hover:bg-stone-700 p-2 rounded">Monument Database</a>

</nav>

</div>



<!-- HEADER -->
<header class="bg-stone-900 text-white flex items-center justify-between p-4 shadow">


<div class="text-lg font-semibold">
AI Assistant
</div>


<button onclick="toggleSidebar()"
class="text-2xl hover:text-stone-300">
☰
</button>


</header>



<!-- CHAT CONTAINER -->
<main class="flex-1 flex flex-col items-center w-full p-6">


<div id="chatMessages"
class="flex flex-col w-full max-w-4xl space-y-4 mb-4 overflow-y-auto">


<!-- Default message -->
<div class="w-full">

<div class="bg-white shadow rounded-lg p-5 w-full leading-relaxed text-[17px]">

Hello. Ask me about monuments, inscriptions, or history.

</div>

</div>


<!-- Flask reply -->
{% if reply %}

<div class="w-full">

<div class="bg-white shadow rounded-lg p-5 w-full leading-relaxed text-[17px]">

{{ reply }}

</div>

</div>

{% endif %}


</div>



<!-- INPUT FORM -->
<form method="POST"
class="w-full max-w-4xl flex gap-2">


<input
name="user_message"
type="text"
placeholder="Ask about a monument..."
class="flex-1 p-3 rounded-lg border border-stone-300 focus:outline-none focus:ring-2 focus:ring-stone-500">


<button
type="submit"
class="bg-stone-900 text-white px-6 py-3 rounded-lg hover:bg-stone-800 transition">

Submit

</button>


</form>


</main>



<script>


function toggleSidebar(){

const sidebar = document.getElementById("sidebar");

const overlay = document.getElementById("overlay");


sidebar.classList.toggle("translate-x-full");

overlay.classList.toggle("hidden");

}


</script>


</body>
</html>
